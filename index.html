<!DOCTYPE html>
<html>
<head>
<title>Brewed Awakening - Coffee Specialists</title>
</head>
<body>
<link rel="stylesheet" href="style.css">
<h1>Welcome to Brewed Awakening</h1>
<p>Please start your order.</p>
<div class="container">
<img src="Screenshot 2026-06-12 093751.png" alt="Brewed Awakening Menu">
<ol>
  <li class="types">Espresso $5.00</li>
  <li class="types">Americano $5.00</li>
  <li class="types">Cappuccino $5.00</li>
  <li class="types">Latte $5.00</li>
  <li class="types">Flat White $5.00</li>
  <li class="types">Long Black $5.00</li>
  <li class="types">Matcha Latte $5.00</li>
  <li class="types">Choco Latte $5.00</li>
  <li class="types">Caramel Milk $5.00</li>
  </ol>
</div>

<form id="orderForm">
  <label for="nameField">Name:</label>
  <input type="text" id="nameField" placeholder="Enter your name">
  <label for="coffeeType">Coffee Type:</label>
  <input type="text" id="coffeeType" placeholder="Enter coffee type">
  <label for="quantity">Quantity:</label>
  <input type="text" id="quantity" placeholder="Enter quantity">
  <label for="money">Money:</label>
  <input type="text" id="money" placeholder="Enter amount of money">
  <input type="submit" value="Submit Order">
</form>

<div id="output" style="display:none;"></div>

<script src="script.js"></script>
</body>
</html>
